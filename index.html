
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-animation"></div>
    <div class="glass-container">
        <main class="player-section">
            <div class="record-container">
                <img id="cover-art" src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=400&auto=format&fit=crop" alt="Album Art">
            </div>
            <div class="song-info">
                <h1 id="song-title">Song Title</h1>
                <h2 id="song-artist">Artist Name</h2>
            </div>
            
            <div class="progress-container">
                <span id="current-time">0:00</span>
                <input type="range" id="progress-bar" value="0" min="0" max="100" step="0.1">
                <span id="duration">0:00</span>
            </div>

            <div class="controls">
                <button id="prev-btn" class="control-btn"><i class="fas fa-step-backward"></i></button>
                <button id="play-btn" class="control-btn play-btn"><i class="fas fa-play"></i></button>
                <button id="next-btn" class="control-btn"><i class="fas fa-step-forward"></i></button>
            </div>

            <div class="volume-container">
                <i class="fas fa-volume-down"></i>
                <input type="range" id="volume-bar" value="1" min="0" max="1" step="0.01">
                <i class="fas fa-volume-up"></i>
            </div>
        </main>

        <aside class="playlist-section">
            <h3>Up Next</h3>
            <ul id="playlist">
                <!-- Playlist Items dynamically generated -->
            </ul>
        </aside>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
